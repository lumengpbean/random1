
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文库 — Shift 刊见</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Compact Header -->
  <header class="site-header article-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-home">&larr; 返回首页</a>
        <h1 class="header-title" style="font-size:1.6rem;">Shift <span class="icon-shift">&#8629;</span> 刊见</h1>
      </div>
      <div class="header-right">
        <p class="header-issn">&#9679; SHIFT 3008 · 2026 创刊号</p>
      </div>
    </div>
  </header>

  <!-- Library -->
  <section class="latest-section">
    <div class="section-header">
      <h2>&#128218; 文库 · 全部文章</h2>
    </div>

    <!-- Search Bar -->
    <div style="margin-bottom: 2rem;">
      <input type="text" id="searchInput" placeholder="搜索文章标题、作者、关键词..."
        style="width: 100%; padding: 0.8rem 1.2rem; font-size: 1rem; font-family: var(--font-serif);
        border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-bg-card);
        color: var(--color-text); outline: none;"
        onfocus="this.style.borderColor='var(--color-accent)'"
        onblur="this.style.borderColor='var(--color-border)'"
      >
    </div>

    <div class="cards" id="articleCards">
      <!-- Cards auto-generated from articles.json -->
    </div>

    <p id="noResults" style="display:none; text-align:center; color:var(--color-text-light); margin-top:2rem;">
      没有找到匹配的文章
    </p>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Shift 刊见 &copy; 2026 — Sheer Honesty In Form and Thought</p>
    <p>由女性书写，为未来署名。开源刊见 · 女性主义知识共同体</p>
  </footer>

  <script>
    // Load articles from JSON and render cards
    fetch('articles.json')
      .then(function(res) { return res.json(); })
      .then(function(articles) {
        var container = document.getElementById('articleCards');
        articles.forEach(function(a) {
          var card = document.createElement('a');
          card.href = a.url;
          card.className = 'card-link';
          card.setAttribute('data-search', a.title + ' ' + a.author + ' ' + a.tags + ' ' + a.excerpt + ' ' + a.searchKeywords);
          card.innerHTML =
            '<article class="card">' +
              '<div class="card-tags">' +
                '<span class="tag tag-' + a.tagColor + '">' + a.tags + '</span>' +
              '</div>' +
              '<h3 class="card-title">' + a.title + '</h3>' +
              '<p class="card-author">&#9998; ' + a.author + '</p>' +
              '<p class="card-excerpt">' + a.excerpt + '</p>' +
            '</article>';
          container.appendChild(card);
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function() {
          var query = this.value.toLowerCase();
          var cards = document.querySelectorAll('#articleCards .card-link');
          var visibleCount = 0;
          cards.forEach(function(card) {
            var text = card.getAttribute('data-search').toLowerCase();
            if (text.includes(query)) {
              card.style.display = '';
              visibleCount++;
            } else {
              card.style.display = 'none';
            }
          });
          document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
        });
      });
  </script>

</body>
</html>
