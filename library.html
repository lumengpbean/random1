
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文库 — Shift 刊见</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Compact Header -->
  <header class="site-header article-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-home">&larr; 返回首页</a>
        <h1 class="header-title" style="font-size:1.6rem;">Shift <span class="icon-shift">&#8629;</span> 刊见</h1>
      </div>
      <div class="header-right">
        <p class="header-issn">&#9679; SHIFT 3008 · 2026 创刊号</p>
      </div>
    </div>
  </header>

  <!-- Library -->
  <section class="latest-section">
    <div class="section-header">
      <h2>&#128218; 文库 · 全部文章</h2>
    </div>

    <!-- Search Bar -->
    <div style="margin-bottom: 2rem;">
      <input type="text" id="searchInput" placeholder="搜索文章标题、作者、关键词..."
        style="width: 100%; padding: 0.8rem 1.2rem; font-size: 1rem; font-family: var(--font-serif);
        border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-bg-card);
        color: var(--color-text); outline: none;"
        onfocus="this.style.borderColor='var(--color-accent)'"
        onblur="this.style.borderColor='var(--color-border)'"
      >
    </div>

    <div class="cards" id="articleCards">
      <!-- Cards auto-generated from articles.json + Supabase -->
    </div>

    <p id="noResults" style="display:none; text-align:center; color:var(--color-text-light); margin-top:2rem;">
      没有找到匹配的文章
    </p>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Shift 刊见 &copy; 2026 — Sheer Honesty In Form and Thought</p>
    <p>由女性书写，为未来署名。开源刊见 · 女性主义知识共同体</p>
  </footer>

  <script>
    var container = document.getElementById('articleCards');

    function createCard(title, author, tags, tagColor, excerpt, url, searchText) {
      var card = document.createElement('a');
      card.href = url;
      card.className = 'card-link';
      card.setAttribute('data-search', searchText);
      card.innerHTML =
        '<article class="card">' +
          '<div class="card-tags">' +
            '<span class="tag tag-' + (tagColor || 'brown') + '">' + (tags || '') + '</span>' +
          '</div>' +
          '<h3 class="card-title">' + title + '</h3>' +
          '<p class="card-author">&#9998; ' + author + '</p>' +
          '<p class="card-excerpt">' + (excerpt || '') + '</p>' +
        '</article>';
      return card;
    }

    // Load from articles.json (existing static articles)
    var jsonPromise = fetch('articles.json')
      .then(function(res) { return res.json(); })
      .then(function(articles) {
        articles.forEach(function(a) {
          var searchText = a.title + ' ' + a.author + ' ' + a.tags + ' ' + a.excerpt + ' ' + (a.searchKeywords || '');
          container.appendChild(createCard(a.title, a.author, a.tags, a.tagColor, a.excerpt, a.url, searchText));
        });
      })
      .catch(function() {});

    // Load approved articles from Supabase
    var sbClient = window.supabase.createClient(
      'https://zcpgslkimjjnmwatmkje.supabase.co',
      'sb_publishable_X15UnM_6AG7rXka9SV9-fw_K3HIlbB6'
    );

    var supaPromise = sbClient
      .from('articles')
      .select('*')
      .eq('status', 'approved')
      .order('created_at', { ascending: false })
      .then(function(result) {
        if (result.data && result.data.length > 0) {
          result.data.forEach(function(a) {
            var searchText = (a.title || '') + ' ' + (a.author || '') + ' ' + (a.tags || '') + ' ' + (a.excerpt || '');
            var url = 'article.html?id=' + a.id;
            container.appendChild(createCard(a.title || '', a.author || '', a.tags || '', a.tag_color || 'brown', a.excerpt || '', url, searchText));
          });
        }
      })
      .catch(function() {});

    // Setup search after both sources load
    Promise.all([jsonPromise, supaPromise]).then(function() {
      document.getElementById('searchInput').addEventListener('input', function() {
        var query = this.value.toLowerCase();
        var cards = document.querySelectorAll('#articleCards .card-link');
        var visibleCount = 0;
        cards.forEach(function(card) {
          var text = card.getAttribute('data-search').toLowerCase();
          if (text.includes(query)) {
            card.style.display = '';
            visibleCount++;
          } else {
            card.style.display = 'none';
          }
        });
        document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
      });
    });
  </script>

</body>
</html>
