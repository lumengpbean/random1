
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿须知 — Shift 刊见</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Compact Header -->
  <header class="site-header article-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-home">&larr; 返回首页</a>
        <h1 class="header-title" style="font-size:1.6rem;">Shift <span class="icon-shift">&#8629;</span> 刊见</h1>
      </div>
      <div class="header-right">
        <p class="header-issn">&#9679; SHIFT 3008 · 2026 创刊号</p>
      </div>
    </div>
  </header>

  <!-- Submission Info -->
  <article class="article-page">
    <h1 class="article-title">SHIFT开放征稿啦！</h1>
    <h2>SHIFT刊见投稿须知（欢迎来稿）</h2>

    <section class="article-body">
      <p><strong>论文推荐结构：</strong>引言 - 文献综述 - 研究方法 - 研究结果 - 讨论 - 总结</p>

      <hr class="submit-divider">

      <h3>在线投稿表单</h3>

      <form id="submitForm" class="submit-form">
        <h4>（一）作者信息</h4>
        <div class="form-group">
          <label class="form-label">作者署名 *</label>
          <input type="text" id="author" required>
        </div>

        <h4>（二）稿件信息</h4>
        <div class="form-group">
          <label class="form-label">论文标题 *</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label class="form-label">摘要（100-200字）</label>
          <textarea id="abstract" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">文件链接（Google Drive / 网盘链接）</label>
          <input type="text" id="fileUrl" placeholder="粘贴你的文件分享链接">
        </div>

        <button type="submit" class="btn-submit">提交稿件</button>
      </form>

      <p id="submitMsg" class="submit-msg-success">
        投稿成功！我们会尽快审核。
      </p>
      <p id="submitError" class="submit-msg-error">
        提交失败，请稍后重试。
      </p>
    </section>
  </article>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Shift 刊见 &copy; 2026 — Sheer Honesty In Form and Thought</p>
    <p>由女性书写，为未来署名。开源刊见 · 女性主义知识共同体</p>
  </footer>

  <script>
    const sb = window.supabase.createClient(
      'https://zcpgslkimjjnmwatmkje.supabase.co',
      'sb_publishable_X15UnM_6AG7rXka9SV9-fw_K3HIlbB6'
    );

    document.getElementById('submitForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('submitMsg').style.display = 'none';
      document.getElementById('submitError').style.display = 'none';

      const { error } = await sb.from('articles').insert({
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        file_url: document.getElementById('fileUrl').value || null,
        status: 'pending'
      });

      if (error) {
        document.getElementById('submitError').style.display = 'block';
        document.getElementById('submitError').textContent = '提交失败: ' + error.message;
      } else {
        document.getElementById('submitMsg').style.display = 'block';
        document.getElementById('submitForm').reset();
      }
    });
  </script>

</body>
</html>
